name: Bug
description: Report a defect or regression
title: "[Bug]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the bug in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who or what is affected?
      placeholder: User impact, system impact, severity, blocked workflows, etc.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include enough detail to reproduce reliably.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Logs, screenshots, links, related issues, suspected cause, etc.
